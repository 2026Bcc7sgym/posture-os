<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Posture OS v7.5</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Posture OS">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192x192/000000/00e676?text=OS">

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #050505; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .camera-wrapper { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform-origin: center center; transition: transform 0.1s ease; }
        canvas { z-index: 2; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px 20px 20px; box-sizing: border-box; }
        #header { text-align: center; background: rgba(0, 0, 0, 0.85); padding: 12px; border-radius: 12px; border: 1px solid #222; }
        h1 { margin: 0; font-size: 18px; letter-spacing: 3px; color: #fff; }
        .subtitle { font-size: 9px; color: #00e676; margin-top: 3px; font-weight: bold; }
        
        #control-panel { background: rgba(0, 0, 0, 0.9); padding: 15px; border-radius: 14px; border: 1px solid #333; pointer-events: auto; display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 6px; justify-content: space-between; align-items: center; width: 100%; }
        select { background: #111; color: white; border: 1px solid #444; padding: 10px; border-radius: 8px; font-size: 11px; width: 38%; box-sizing: border-box; }
        button { background: #00e676; color: black; border: none; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 11px; width: 38%; cursor: pointer; text-align: center; box-sizing: border-box; }
        .btn-scan { background: #00b0ff; color: white; }
        .btn-home { background: #444; color: white; width: 20%; font-size: 11px; }
        
        .adj-box { display: flex; background: #111; padding: 8px; border-radius: 8px; border: 1px solid #333; gap: 6px; align-items: center; width: 100%; box-sizing: border-box; }
        .adj-label { font-size: 10px; color: #aaa; white-space: nowrap; }
        .slider { flex-grow: 1; -webkit-appearance: none; background: #333; height: 6px; border-radius: 3px; width: 30%; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; background: #00e676; width: 16px; height: 16px; border-radius: 50%; }
        .btn-toggle { background: #333; color: white; width: auto; padding: 6px 8px; font-size: 10px; border: 1px solid #555; border-radius: 6px; white-space: nowrap; }
        .btn-cam-switch { background: #00b0ff; color: white; border: 1px solid #00b0ff; }
        
        #overlay-display { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 4; font-size: 70px; font-weight: 900; text-align: center; text-shadow: 0 0 25px rgba(0,0,0,1); pointer-events: none; display: none; }
        
        #big-alert { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 5; background: rgba(255, 23, 68, 0.98); color: white; padding: 25px 35px; border-radius: 16px; font-size: 18px; font-weight: 900; letter-spacing: 1px; box-shadow: 0 0 40px rgba(255, 23, 68, 0.8); border: 3px solid #fff; text-align: center; white-space: nowrap; display: none; pointer-events: none; animation: alert-pulse 0.8s infinite; line-height: 1.4; }
        @keyframes alert-pulse { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.03); } 100% { transform: translate(-50%, -50%) scale(1); } }

        #analytics-report { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 6; background: rgba(10, 10, 10, 0.98); border: 2px solid #00e676; width: 95%; max-width: 360px; padding: 20px; border-radius: 16px; box-shadow: 0 0 30px rgba(0, 230, 118, 0.3); display: none; pointer-events: auto; }
        .report-title { font-size: 18px; font-weight: 900; text-align: center; color: #00e676; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .best-rep-box { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #222; text-align: center; margin-bottom: 15px; font-size: 14px; }
        .best-rep-num { font-size: 20px; font-weight: 900; color: #00b0ff; }
        .feedback-item { margin-bottom: 12px; font-size: 12px; line-height: 1.5; }
        .feedback-label { font-weight: bold; color: #fff; display: flex; justify-content: space-between; }
        .feedback-desc { color: #aaa; margin-top: 2px; padding-left: 5px; border-left: 2px solid #444; }
        .btn-close-report { background: #00e676; color: #000; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; border: none; margin-top: 10px; cursor: pointer; font-size: 12px; }

        #status-box { font-size: 13px; font-weight: bold; text-align: center; padding: 12px; border-radius: 12px; background: rgba(0, 0, 0, 0.85); border: 2px solid #444; min-height: 40px; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .status-perfect { color: #00e676; border-color: #00e676 !important; }
        .status-error { color: #ff1744; border-color: #ff1744 !important; background: rgba(255, 0, 0, 0.1) !important; }
        .status-scanning { color: #00b0ff; border-color: #00b0ff !important; }
        
        #metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; background: rgba(0, 0, 0, 0.85); padding: 10px; border-radius: 10px; border: 1px solid #222; }
        .metric { text-align: center; font-size: 9px; color: #aaa; }
        .metric span { display: block; font-size: 13px; font-weight: bold; margin-top: 3px; color: white; }
    </style>
</head>
<body>

<div class="camera-wrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div id="overlay-display">10</div>
    <div id="big-alert">WARNING<br>重心軸ブレ！</div>

    <div id="analytics-report">
        <div class="report-title">KITAJIMA JUMP REPORT</div>
        <div class="best-rep-box">
            <span>BEST JUMP SQUAT: </span><span id="rep-best-num" class="best-rep-num">第 - レップ</span>
            <div style="font-size: 11px; color: #aaa; margin-top: 3px;">欧米式JUMP適合率: <b id="rep-best-score" style="color:#00e676;">-%</b></div>
        </div>
        <div class="feedback-item">
            <div class="feedback-label"><span>① 母指球ロック (重心軸)</span><span id="score-cog" style="color:#00e676;">-%</span></div>
            <div id="desc-cog" class="feedback-desc">-</div>
        </div>
        <div class="feedback-item">
            <div class="feedback-label"><span>② ヒップヒンジ (尻の初動)</span><span id="score-hinge" style="color:#00e676;">-%</span></div>
            <div id="desc-hinge" class="feedback-desc">-</div>
        </div>
        <div class="feedback-item">
            <div class="feedback-label"><span>③ 腹圧キープ (体幹固定)</span><span id="score-spine" style="color:#00e676;">-%</span></div>
            <div id="desc-spine" class="feedback-desc">-</div>
        </div>
        <button class="btn-close-report" onclick="resetToHome()">データを確定してメニューに戻る</button>
    </div>
    
    <div id="ui-layer">
        <div id="header">
            <h1>HUMAN POSTURE OS</h1>
            <div class="subtitle">HYPER ENGINE v7.5</div>
        </div>
        
        <div id="control-panel">
            <div class="adj-box">
                <span class="adj-label">倍率</span>
                <input type="range" id="zoom-slider" class="slider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateCameraTransform()">
                <button class="btn-toggle" id="mirror-btn" onclick="toggleMirror()">反転</button>
                <button class="btn-toggle btn-cam-switch" id="cam-btn" onclick="switchCamera()">レンズ切替</button>
            </div>
            
            <div class="row">
                <select id="mode-select" onchange="switchMode()">
                    <option value="custom">カスタム（5レップ分析）</option>
                    <option value="hip">簡単：ヒップアップ</option>
                    <option value="bulk">簡単：レッグバルクアップ</option>
                    <option value="athlete">簡単：アスリート</option>
                </select>
                <button id="action-btn" class="btn-scan" onclick="startScanSequence()">分析開始</button>
                <button id="home-btn" class="btn-home" onclick="resetToHome()">ホーム</button>
            </div>
        </div>
        
        <div id="status-box">OS初期化中...</div>
        
        <div id="metrics">
            <div class="metric">胸尻重心比 (COG)<span><b id="m-cog">-</b> / <i id="t-cog">未設定</i></span></div>
            <div class="metric">体幹固定 (Spine)<span id="m-spine">-</span></div>
            <div class="metric">足首・尻バランス<span id="m-ankle">-</span></div>
        </div>
    </div>
</div>

<script>
    const videoElement = document.getElementById('video');
    const canvasElement = document.getElementById('canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusBox = document.getElementById('status-box');
    const overlayDisplay = document.getElementById('overlay-display');
    const bigAlert = document.getElementById('big-alert');
    const analyticsReport = document.getElementById('analytics-report');
    const modeSelect = document.getElementById('mode-select');
    const actionBtn = document.getElementById('action-btn');
    const zoomSlider = document.getElementById('zoom-slider');
    
    const mCog = document.getElementById('m-cog');
    const tCog = document.getElementById('t-cog');
    const mSpine = document.getElementById('m-spine');
    const mAnkle = document.getElementById('m-ankle');

    let appState = "idle"; 
    let currentMode = "custom";
    let countdownValue = 10;
    let repCount = 0;
    let isBottomZone = false;
    let scalledDataSamples = [];
    let isAiProcessing = false; 
    let isMirrored = false; 
    let zoomScale = 1.0;

    let videoDevices = [];
    let currentDeviceIdx = 0;
    let currentStream = null;

    let currentRepHistory = [];
    let allRepsSummary = [];

    // 【現場最適化】母指球中心軸（JUMPポジション）の許容範囲を0.35〜0.65に大幅拡大して誤爆を完全防止
    let activeTarget = { cogMin: 0.35, cogMax: 0.65, label: "0.35 - 0.65" };

    const presets = {
        hip: { name: "ヒップアップ", cogMin: 0.32, cogMax: 0.48, label: "0.32 - 0.48" },
        bulk: { name: "レッグバルクアップ", cogMin: 0.52, cogMax: 0.68, label: "0.52 - 0.68" },
        athlete: { name: "アスリート", cogMin: 0.35, cogMax: 0.65, label: "0.35 - 0.65" }
    };

    function updateCameraTransform() {
        zoomScale = zoomSlider.value;
        const hFlip = isMirrored ? -1 : 1;
        videoElement.style.transform = `scale(${hFlip * zoomScale}, ${zoomScale})`;
        canvasElement.style.transform = `scale(${hFlip * zoomScale}, ${zoomScale})`;
    }

    // 【新設】リフレッシュ一切不要でシステムを完全初期状態へ「確定リセット」する本質関数
    function resetToHome() {
        appState = "idle";
        repCount = 0;
        isBottomZone = false;
        currentRepHistory = [];
        allRepsSummary = [];
        scalledDataSamples = [];
        
        bigAlert.style.display = "none";
        analyticsReport.style.display = "none";
        overlayDisplay.style.display = "none";
        
        actionBtn.innerText = "分析開始";
        actionBtn.className = "btn-scan";
        modeSelect.value = "custom";
        currentMode = "custom";
        tCog.innerText = "未設定";
        statusBox.innerText = "モードを選択して開始してください";
        statusBox.className = "";
        
        mCog.innerText = "-";
        mSpine.innerText = "-";
        mAnkle.innerText = "-";
    }

    function toggleMirror() {
        isMirrored = !isMirrored;
        updateCameraTransform();
    }

    function calculateAngle(a, b, c) {
        const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
        let angle = Math.abs(radians * 180.0 / Math.PI);
        if (angle > 180.0) angle = 360 - angle;
        return angle;
    }

    function switchMode() {
        currentMode = modeSelect.value;
        analyticsReport.style.display = "none";
        bigAlert.style.display = "none";
        if (currentMode === "custom") {
            actionBtn.innerText = "分析開始";
            actionBtn.className = "btn-scan";
            tCog.innerText = "未設定";
            statusBox.innerText = "5レップ母指球ロック解析。JUMP最適バランスをジャッジします";
            statusBox.className = "";
            appState = "idle";
        } else {
            actionBtn.innerText = "システム稼働中";
            actionBtn.className = "";
            activeTarget = presets[currentMode];
            tCog.innerText = presets[currentMode].label;
            statusBox.innerText = `簡単設定：【${presets[currentMode].name}】監視中`;
            statusBox.className = "status-perfect";
            appState = "active";
        }
    }

    function startScanSequence() {
        if (currentMode !== "custom" || appState === "countdown" || appState === "scanning") return;
        appState = "countdown";
        countdownValue = 10;
        repCount = 0;
        scalledDataSamples = [];
        allRepsSummary = [];
        currentRepHistory = [];
        overlayDisplay.innerText = countdownValue;
        overlayDisplay.style.display = "block";
        overlayDisplay.style.color = "#00b0ff";
        statusBox.innerText = "母指球に重心をロックし、JUMPのセットアップをしてください";
        statusBox.className = "status-scanning";
        bigAlert.style.display = "none";
        analyticsReport.style.display = "none";
        
        const timer = setInterval(() => {
            countdownValue--;
            if (countdownValue > 0) {
                overlayDisplay.innerText = countdownValue;
            } else if (countdownValue === 0) {
                overlayDisplay.innerText = "START";
                overlayDisplay.style.color = "#00e676";
                statusBox.innerText = "JUMPエンジン稼働！反復運動を感知します";
                appState = "scanning";
            } else {
                clearInterval(timer);
                overlayDisplay.innerText = "REP 0";
            }
        }, 1000);
    }

    function onResults(results) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

        if (results.poseLandmarks) {
            drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: 'rgba(255,255,255,0.25)', lineWidth: 1});
            drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#00e676', lineWidth: 1, radius: 1.5});

            const ear = results.poseLandmarks[8];
            const shoulder = results.poseLandmarks[12];
            const hip = results.poseLandmarks[24];
            const knee = results.poseLandmarks[26];
            
            const rawAnkle = results.poseLandmarks[28];
            const rawHeel = results.poseLandmarks[30];
            const rawToe = results.poseLandmarks[32];

            if (shoulder.visibility > 0.5 && hip.visibility > 0.5 && knee.visibility > 0.5) {
                
                const ankle = (rawAnkle && rawAnkle.visibility > 0.3) ? rawAnkle : { x: knee.x, y: knee.y + (hip.y - shoulder.y) * 0.5 };
                const heel = (rawHeel && rawHeel.visibility > 0.3) ? rawHeel : { x: ankle.x - 0.05, y: ankle.y };
                const toe = (rawToe && rawToe.visibility > 0.3) ? rawToe : { x: ankle.x + 0.08, y: ankle.y };

                const upperBodyCogX = (shoulder.x + hip.x) / 2;
                const footLength = Math.abs(toe.x - heel.x);
                
                const isFacingRight = toe.x < heel.x; 
                let currentRatio = isFacingRight ? (heel.x - upperBodyCogX) / footLength : (upperBodyCogX - heel.x) / footLength;
                
                if (isMirrored) currentRatio = 1.0 - currentRatio;
                if (currentRatio < 0) currentRatio = 0;
                if (currentRatio > 1) currentRatio = 1;
                mCog.innerText = currentRatio.toFixed(2);

                const torsoAngle = calculateAngle(shoulder, hip, knee);
                const spineLine = calculateAngle(ear, shoulder, hip);   
                let isSpineOk = spineLine > 140;   
                mSpine.innerText = isSpineOk ? "固定 (OK)" : "エラー";
                mSpine.style.color = isSpineOk ? "#00e676" : "#ff1744";

                const kneeForward = isFacingRight ? (toe.x - knee.x) : (knee.x - toe.x);
                let hipHingeScore = 100;
                if (torsoAngle < 155 && kneeForward < -0.03) {
                    hipHingeScore = Math.max(30, Math.round(100 - Math.abs(kneeForward) * 300));
                }

                const ankleAngle = calculateAngle(knee, ankle, heel); 
                const hipOutDistance = isFacingRight ? (hip.x - toe.x) : (toe.x - hip.x);
                let isNotHeelWeighted = true;
                if (ankleAngle > 70 && hipOutDistance > 0.10) { 
                    const chestForward = isFacingRight ? (hip.x - shoulder.x) : (shoulder.x - hip.x);
                    if (chestForward < 0.02) isNotHeelWeighted = false;
                }
                mAnkle.innerText = isNotHeelWeighted ? "つま先重心" : "かかと脱落";
                mAnkle.style.color = isNotHeelWeighted ? "#00e676" : "#ff1744";

                // 拡大された高精度マイルド・ターゲット（0.35〜0.65）
                const isCogOnBallOfFoot = currentRatio >= 0.35 && currentRatio <= 0.65;

                if (appState === "scanning") {
                    
                    // 【改善】リアルタイム中の警告トリガーを大幅に緩和。本当に大崩れした時だけ作動
                    if (torsoAngle < 150 && !isCogOnBallOfFoot) {
                        bigAlert.innerHTML = "WARNING<br>重心が極端にブレています！";
                        bigAlert.style.display = "block";
                        canvasCtx.fillStyle = "rgba(255, 0, 0, 0.15)";
                        canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
                    } else if (torsoAngle < 150 && hipHingeScore < 40) {
                        bigAlert.innerHTML = "WARNING<br>膝が出すぎています！";
                        bigAlert.style.display = "block";
                        canvasCtx.fillStyle = "rgba(255, 0, 0, 0.15)";
                        canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
                    } else {
                        bigAlert.style.display = "none";
                    }

                    // 【究極の改善：ピコピコ超高感度エンジン】
                    // わずかでも股関節が折れたら（158度以下）即座にボトムカウント開始
                    if (torsoAngle < 158) { 
                        isBottomZone = true;
                        currentRepHistory.push({
                            cog: currentRatio,
                            spine: spineLine,
                            hinge: hipHingeScore,
                            isBall: isCogOnBallOfFoot
                        });
                    } 
                    // わずかでも元の位置の近くに戻ったら（165度以上）即レップ確定
                    else if (torsoAngle > 165 && isBottomZone) { 
                        isBottomZone = false;
                        repCount++;
                        overlayDisplay.innerText = "REP " + repCount;

                        if (currentRepHistory.length > 0) {
                            let avgCog = currentRepHistory.reduce((acc, d) => acc + d.cog, 0) / currentRepHistory.length;
                            let minSpine = Math.min(...currentRepHistory.map(d => d.spine));
                            let minHinge = Math.min(...currentRepHistory.map(d => d.hinge));

                            let cogScore = Math.max(0, 100 - Math.abs(avgCog - 0.50) * 300); 
                            let spineScore = minSpine > 140 ? 100 : 50;
                            let finalRepScore = Math.round((cogScore * 0.4) + (spineScore * 0.3) + (minHinge * 0.3));

                            allRepsSummary.push({
                                repNum: repCount,
                                score: finalRepScore,
                                cog: cogScore,
                                hinge: minHinge,
                                spine: spineScore,
                                rawCog: avgCog
                            });
                        }
                        currentRepHistory = [];

                        if (repCount >= 5) {
                            appState = "idle";
                            overlayDisplay.style.display = "none";
                            showAnalyticsReport();
                        }
                    }
                } 
                else if (appState === "active") {
                    if (torsoAngle < 154) { 
                        const isMatchPreset = currentRatio >= activeTarget.cogMin && currentRatio <= activeTarget.cogMax;
                        if (isMatchPreset && isSpineOk && isNotHeelWeighted && hipHingeScore > 50) {
                            statusBox.innerText = "PERFECT: JUMP BALANCEロック";
                            statusBox.className = "status-perfect";
                            bigAlert.style.display = "none"; 
                        } else {
                            statusBox.innerText = "WARNING: 軸バランス崩れ";
                            statusBox.className = "status-error";
                            bigAlert.innerHTML = "WARNING<br>JUMPバランス崩れ！";
                            bigAlert.style.display = "block";
                            canvasCtx.fillStyle = "rgba(255, 0, 0, 0.15)";
                            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
                        }
                    } else {
                        statusBox.innerText = "SQUAT DOWN...";
                        statusBox.className = "";
                        bigAlert.style.display = "none";
                    }
                }
            }
        }
        canvasCtx.restore();
    }

    function showAnalyticsReport() {
        if (allRepsSummary.length === 0) return;
        let bestRep = allRepsSummary.reduce((max, rep) => rep.score > max.score ? rep : max, allRepsSummary[0]);
        
        document.getElementById('rep-best-num').innerText = `第 ${bestRep.repNum} レップ`;
        document.getElementById('rep-best-score').innerText = `${bestRep.score}点`;
        
        document.getElementById('score-cog').innerText = `${Math.round(bestRep.cog)}点`;
        document.getElementById('score-hinge').innerText = `${Math.round(bestRep.hinge)}点`;
        document.getElementById('score-spine').innerText = `${Math.round(bestRep.spine)}点`;

        if (bestRep.cog >= 80) {
            document.getElementById('desc-cog').innerText = "極上。重心の軸がブレずに「母指球」へ完全ロック。最も高くJUMPできる本物の欧米式バランスです。";
        } else if (bestRep.rawCog > 0.65) {
            document.getElementById('desc-cog').innerText = "かかと側に軸が落ち、JUMPの爆発力が殺されています。つま先寄りの母指球で地球を捉えて。";
        } else {
            document.getElementById('desc-cog').innerText = "つま先を攻めすぎて前方に突っ込んでいます。母指球の上で軸を垂直にキープ。";
        }

        if (bestRep.hinge >= 80) {
            document.getElementById('desc-hinge').innerText = "素晴らしいヒンジ。膝を前に出さず、骨盤主動で前後バランスを精密に維持できています。";
        } else {
            document.getElementById('desc-hinge').innerText = "膝主導（日本式）の悪いフォームです。しゃがむ初動で骨盤を引き、母指球の真上で上下して。";
        }

        if (bestRep.spine >= 80) {
            document.getElementById('desc-spine').innerText = "完璧な体幹ロック。腹圧が一切抜けず、強烈なパワーを受け止める剛性が完成しています。";
        } else {
            document.getElementById('desc-spine').innerText = "ボトムで腹圧が抜け、軸が潰れています。セット中、常に腹圧をキープ。";
        }

        analyticsReport.style.display = "block";
        statusBox.innerText = "JUMP解析完了";
        statusBox.className = "status-perfect";
    }

    const pose = new Pose({locateFile: (file) => { return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`; }});
    pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onResults);

    async function startCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }

        const constraints = {
            audio: false,
            video: { width: { ideal: 480 }, height: { ideal: 640 } }
        };

        if (videoDevices.length > 0) {
            constraints.video.deviceId = { exact: videoDevices[currentDeviceIdx].deviceId };
        } else {
            constraints.video.facingMode = "user";
        }

        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            videoElement.srcObject = currentStream;
            
            if (videoDevices.length === 0) {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const uniqueDevices = [];
                const maps = new Set();
                for (let d of devices) {
                    if (d.kind === 'videoinput' && !maps.has(d.label)) {
                        maps.add(d.label);
                        uniqueDevices.push(d);
                    }
                }
                videoDevices = uniqueDevices;
            }

            videoElement.addEventListener('loadedmetadata', () => {
                videoElement.play();
                updateCameraTransform(); 
                setTimeout(processVideo, 75);
                statusBox.innerText = "モードを選択して開始してください";
            });
        } catch (err) {
            if (constraints.video.deviceId) {
                videoDevices = [];
                currentDeviceIdx = 0;
            }
            statusBox.innerText = "カメラ起動エラー。再読み込みしてください";
        }
    }

    async function switchCamera() {
        if (videoDevices.length <= 1) {
            statusBox.innerText = "切り替え可能な予備レンズがありません";
            return;
        }
        currentDeviceIdx = (currentDeviceIdx + 1) % videoDevices.length;
        await startCamera();
    }

    async function processVideo() {
        if (videoElement.paused || videoElement.ended) {
            setTimeout(processVideo, 100);
            return;
        }
        if (appState === "countdown") {
            setTimeout(processVideo, 75);
            return;
        }
        if (videoElement.readyState >= 2 && !isAiProcessing) {
            isAiProcessing = true;
            try {
                await pose.send({image: videoElement});
            } catch (e) {
                console.error(e);
            }
            isAiProcessing = false;
        }
        setTimeout(processVideo, 75);
    }
    startCamera();
</script>
